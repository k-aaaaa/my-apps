<!-- File: index.html -->
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>冷凍弁当管理</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 pb-24">

    <header class="bg-orange-500 text-white p-4 sticky top-0 z-10 shadow-md flex justify-between items-center">
        <h1 class="text-xl font-bold">冷凍弁当マネージャー</h1>
        <div class="flex gap-3">
            <button onclick="syncCloud()" id="sync-btn" class="text-xl" title="クラウド同期">☁️</button>
            <button onclick="showTab('settings')" class="text-xl">⚙️</button>
        </div>
    </header>

    <main class="p-4 max-w-md mx-auto">
        <!-- HOME: 在庫一覧 -->
        <section id="home" class="tab-content active space-y-4">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 text-center">
                <p class="text-gray-500 text-sm">現在の在庫合計</p>
                <p id="total-count" class="text-5xl font-black text-orange-600">0</p>
            </div>
            <div id="inventory-list" class="space-y-2"></div>
        </section>

        <!-- CREATE: 作る -->
        <section id="create" class="tab-content space-y-4">
            <h2 class="text-lg font-bold">新しく作る</h2>
            <div id="recipe-selection" class="grid grid-cols-1 gap-3"></div>
            
            <div id="cooking-panel" class="hidden bg-white p-4 rounded-xl border-2 border-orange-200 shadow-lg">
                <h3 id="cooking-name" class="font-bold text-xl mb-2 text-orange-600"></h3>
                <div class="mb-4">
                    <label class="block text-xs text-gray-400 font-bold mb-1">作る数（タッパー数）</label>
                    <input type="number" id="make-count" value="4" class="w-full text-3xl p-2 border-b-2 border-orange-500 outline-none">
                </div>
                <button onclick="finishCooking()" class="w-full bg-orange-500 text-white py-4 rounded-xl font-bold shadow-lg active:scale-95">完成（在庫に反映）</button>
                <button onclick="cancelCooking()" class="w-full text-gray-400 py-2 mt-2 text-sm">キャンセル</button>
            </div>
        </section>

        <!-- HISTORY: 履歴 -->
        <section id="history" class="tab-content space-y-3">
            <h2 class="text-lg font-bold">作成履歴（直近10件）</h2>
            <div id="history-list" class="space-y-2"></div>
        </section>

        <!-- SETTINGS: 設定・バックアップ -->
        <section id="settings" class="tab-content space-y-6">
            <h2 class="text-lg font-bold">設定・バックアップ</h2>
            <div class="bg-white p-4 rounded-xl shadow border space-y-6">
                <div>
                    <p class="font-bold text-sm mb-2">① ファイル保存（確実）</p>
                    <button onclick="downloadFile()" class="w-full bg-blue-500 text-white p-3 rounded-lg text-sm mb-2">データをファイルで保存</button>
                    <input type="file" id="file-input" onchange="uploadFile(event)" class="text-xs w-full border p-2 rounded">
                </div>
                <hr>
                <div>
                    <p class="font-bold text-sm mb-2">② クラウド同期（Googleスプレッドシート）</p>
                    <input type="text" id="gas-url" class="w-full border p-2 text-xs mb-2 rounded" placeholder="GASのウェブアプリURLを貼り付け">
                    <button onclick="saveGasUrl()" class="w-full bg-green-600 text-white p-3 rounded-lg text-sm">URLを保存</button>
                </div>
            </div>
        </section>
    </main>

    <!-- Navigation -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around p-3 pb-8 shadow-2xl">
        <button onclick="showTab('home')" class="flex flex-col items-center text-gray-400" id="nav-home">
            <span class="text-2xl">🏠</span><span class="text-[10px]">在庫</span>
        </button>
        <button onclick="showTab('create')" class="flex flex-col items-center text-gray-400" id="nav-create">
            <span class="text-2xl">🍳</span><span class="text-[10px]">作る</span>
        </button>
        <button onclick="showTab('history')" class="flex flex-col items-center text-gray-400" id="nav-history">
            <span class="text-2xl">📜</span><span class="text-[10px]">履歴</span>
        </button>
    </nav>

    <script src="app.js"></script>
</body>
</html>
