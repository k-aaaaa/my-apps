<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="manifest" href="manifest.json">
    <title>お弁当在庫・節約管理</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body class="theme-stylish">

    <div id="splash" class="fixed-splash">
        <div id="splash-default" class="splash-content">
            <div class="splash-logo">🍱</div>
            <h1 class="splash-title">BENTO APP</h1>
        </div>
        <img id="splash-custom" class="splash-custom-img hidden" src="" alt="Welcome">
    </div>

    <div class="bg-layer" id="main-bg"></div>

    <header class="header">
        <div class="header-main">
            <span class="header-label">💰 浮いたお弁当代</span>
            <div class="header-money" id="saved-money" title="タップして微調整も可能">¥0</div>
        </div>
        <div class="header-status">
            <span class="currency-display">冷凍ストック: <strong id="total-count">0</strong>食</span>
        </div>
    </header>

    <main class="main-container">

        <section id="view-home" class="view active">
            <button onclick="spinRoulette()" class="btn btn-primary w-full" style="margin-bottom:15px; font-size: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);">🎲 今日どれ食べる？（ルーレット）</button>
            <div class="list-container" id="inventory-list"></div>
        </section>

        <section id="view-cook" class="view">
            <div id="recipe-selection" class="grid-container"></div>

            <div id="cooking-panel" class="panel hidden">
                <div class="cooking-header">
                    <span id="cooking-emoji" class="text-4xl">🍱</span>
                    <h3 id="cooking-name" class="cooking-title">料理名</h3>
                </div>
                <div class="form-group text-center">
                    <label>何食分ストックを作った？</label>
                    <div class="counter-input">
                        <button onclick="changeMakeCount(-1)" class="btn-circle">-</button>
                        <input type="number" id="make-count" value="4" class="form-input text-center" inputmode="numeric" pattern="[0-9]*">
                        <button onclick="changeMakeCount(1)" class="btn-circle">+</button>
                    </div>
                </div>
                <div class="button-group">
                    <button onclick="finishCooking()" class="btn btn-primary">完成！ストックに追加</button>
                    <button onclick="cancelCooking()" class="btn btn-outline">戻る</button>
                </div>
            </div>
        </section>

        <section id="view-menu" class="view space-y">
            <div class="panel">
                <h2 class="panel-title">🛒 週末のお買い物リスト</h2>
                <div id="shopping-list-container">
                    <p class="text-center opacity-50 text-xs">メニュー管理でチェックした料理の材料がここに自動で並びます</p>
                </div>
                <div class="button-group" style="margin-top:15px;">
                    <button onclick="copyShoppingListToClipboard()" class="btn btn-share">📋 コピー</button>
                    <button onclick="resetShoppingList()" class="btn btn-outline" style="border-color:#ff4444; color:#ff4444;">🗑️ 買い出し完了</button>
                </div>
            </div>

            <div class="panel">
                <h2 class="panel-title">✏️ メニューの登録・編集</h2>
                <input type="hidden" id="edit-recipe-id">
                <div class="form-row">
                    <input type="text" id="new-recipe-emoji" placeholder="🍱" class="form-input text-center" style="width:60px;" maxlength="4">
                    <input type="text" id="new-recipe-name" placeholder="料理名（例：ハンバーグ）" class="form-input flex-1">
                </div>
                <div class="form-group" style="margin-top:10px;">
                    <label>必要な材料（カンマやスペースで区切ってね）</label>
                    <input type="text" id="new-recipe-ing" placeholder="ひき肉, 玉ねぎ, パン粉" class="form-input">
                </div>
                <div class="button-group">
                    <button id="save-recipe-btn" onclick="saveRecipe()" class="btn btn-primary">メニューに追加</button>
                    <button id="cancel-recipe-btn" onclick="cancelEditRecipe()" class="btn btn-outline hidden">キャンセル</button>
                </div>
                <div class="recipe-edit-list" id="recipe-edit-list"></div>
            </div>
        </section>

        <section id="view-history" class="view">
            <div class="panel">
                <h2 class="panel-title">😋 最近食べたお弁当（最新30件）</h2>
                <p style="font-size:10px; opacity:0.6; margin-bottom:15px;">※スマホの動作を軽くするため、データは最新30件のみ自動保存されます。</p>
                <div class="history-list" id="history-list"></div>
            </div>
        </section>

        <section id="view-settings" class="view space-y">
            <div class="panel">
                <h2 class="panel-title">🎨 アプリのテーマ着せ替え</h2>
                <select id="theme-selector" class="form-input" onchange="changeAppTheme(this.value)">
                    <option value="theme-stylish">🤍 スタイリッシュ (すりガラス透明感)</option>
                    <option value="theme-cute">🌸 ポップ＆キュート (パステルふんわり)</option>
                    <option value="theme-gaming">🎮 ゲーミング (ダーク＆ネオン発光)</option>
                </select>
            </div>

            <div class="panel" id="color-custom-panel">
                <h2 class="panel-title">🎨 選択中テーマのカラーカスタム</h2>
                <div class="color-picker-grid">
                    <div class="color-picker-row">
                        <label>全体の背景色</label>
                        <input type="color" id="custom-color-bg" onchange="updateCustomColor('bg', this.value)">
                    </div>
                    <div class="color-picker-row">
                        <label>パネルの背景色</label>
                        <input type="color" id="custom-color-panel" onchange="updateCustomColor('panel', this.value)">
                    </div>
                    <div class="color-picker-row">
                        <label>アクセント（ボタン等）</label>
                        <input type="color" id="custom-color-accent" onchange="updateCustomColor('accent', this.value)">
                    </div>
                </div>
                <button onclick="resetCurrentThemeColors()" class="btn btn-outline w-full" style="margin-top:12px; padding:8px; font-size:11px;">このテーマの色を初期化</button>
            </div>

            <div class="panel">
                <h2 class="panel-title">🖼️ お出迎え画面・タイトル設定</h2>
                <div class="form-group">
                    <label>お出迎え画像を選ぶ</label>
                    <input type="file" id="settings-welcome-img" accept="image/*" class="form-input file-input" onchange="saveWelcomeImage(event)">
                </div>
                <div class="form-group">
                    <label>表示時間</label>
                    <select id="settings-splash-time" class="form-input" onchange="saveSplashTime(this.value)">
                        <option value="500">サクッと (0.5秒)</option>
                        <option value="1200" selected>普通 (1.2秒)</option>
                        <option value="2500">じっくり (2.5秒)</option>
                    </select>
                </div>
                <div id="welcome-img-preview-container" class="hidden text-center">
                    <img id="welcome-img-preview" class="img-preview" src="">
                    <button onclick="clearWelcomeImage()" class="btn-text-danger">画像を消去する</button>
                </div>
            </div>

            <div class="panel">
                <h2 class="panel-title">⚙️ 計算ルールのカスタマイズ</h2>
                <div class="form-group">
                    <label>お弁当1食あたりの節約想定額 (円)</label>
                    <input type="number" id="settings-save-unit" class="form-input" value="600" inputmode="numeric" pattern="[0-9]*">
                </div>
                <div class="form-group">
                    <label>冷凍してから何日経ったらアラートを出す？ (日)</label>
                    <input type="number" id="settings-alert-days" class="form-input" value="14" inputmode="numeric" pattern="[0-9]*">
                </div>
                <button onclick="saveAppSettings()" class="btn btn-primary w-full">ルールを保存する</button>
            </div>

            <div class="panel" style="border: 2px solid var(--accent-color);">
                <h2 class="panel-title">💾 究極のデータバックアップ</h2>
                <button onclick="exportData()" class="btn btn-primary w-full" style="margin-bottom:10px;">📥 データを書き出す (保存)</button>
                <label class="btn btn-outline w-full text-center" style="display:block; cursor:pointer;">
                    📤 ファイルからデータを復元する
                    <input type="file" accept=".json" class="hidden" onchange="importData(event)">
                </label>
            </div>

            <div class="panel">
                <h2 class="panel-title">☁️ クラウド同期 (GAS)</h2>
                <input type="text" id="gas-url" class="form-input text-xs" placeholder="GASのURLを貼り付け">
                <div class="button-group" style="margin-top:10px;">
                    <button onclick="saveGasUrl()" class="btn btn-outline" style="font-size:12px;">URL保存</button>
                    <button onclick="triggerManualSync()" class="btn btn-share" style="font-size:12px;">☁️ 手動同期</button>
                </div>
                <label class="flex-row-label">
                    <input type="checkbox" id="settings-auto-sync" onchange="toggleAutoSync(this.checked)"> 操作時に自動バックアップを行う
                </label>
                <hr style="border:0; border-top:1px solid rgba(0,0,0,0.1); margin:20px 0;">
                <button onclick="resetData()" class="btn-text-danger w-full" style="text-align:center;">🗑️ アプリの全データをリセット</button>
            </div>
        </section>

    </main>

    <nav class="bottom-nav">
        <button class="nav-btn active" data-target="view-home"><span class="icon">🍱</span><br><span class="label">ストック</span></button>
        <button class="nav-btn" data-target="view-cook"><span class="icon">🍳</span><br><span class="label">作った</span></button>
        <button class="nav-btn" data-target="view-menu"><span class="icon">🛒</span><br><span class="label">メニュー</span></button>
        <button class="nav-btn" data-target="view-history"><span class="icon">📜</span><br><span class="label">履歴</span></button>
        <button class="nav-btn" data-target="view-settings"><span class="icon">🛠️</span><br><span class="label">設定</span></button>
    </nav>

    <script src="app.js"></script>
</body>
</html>
