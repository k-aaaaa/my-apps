<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="icon.png">
    <title>資産形成管理</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#f2fcf5] pb-24 text-gray-700"> <header class="bg-[#b7e4c7] text-[#2d6a4f] p-4 sticky top-0 z-10 shadow-sm flex justify-between items-center">
        <h1 id="header-title" class="text-xl font-bold tracking-wide">💰 ダッシュボード</h1>
        <div class="flex gap-3">
            <button onclick="syncCloud()" id="sync-btn" class="text-xl drop-shadow-sm">☁️</button>
            <button onclick="showTab('settings')" class="text-xl drop-shadow-sm">⚙️</button>
        </div>
    </header>

    <main class="p-4 max-w-md mx-auto">
        <section id="home" class="tab-content active space-y-6">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-green-50 text-center relative overflow-hidden">
                <p class="text-gray-400 text-sm font-bold mb-1">設定年数後の予測資産額</p>
                <p id="future-amount" class="text-4xl font-black text-[#52b788] drop-shadow-sm">¥0</p>
                
                <div class="mt-6 text-left">
                    <div class="flex justify-between text-xs font-bold text-gray-400 mb-1">
                        <span>達成率</span><span id="goal-percent">0%</span>
                    </div>
                    <div class="w-full bg-gray-100 rounded-full h-3">
                        <div id="progress-bar" class="bg-[#52b788] h-3 rounded-full transition-all duration-1000 w-0"></div>
                    </div>
                    <p class="text-right text-xs text-gray-400 mt-1">目標: <span id="goal-display">¥0</span></p>
                </div>
            </div>

            <div class="bg-white p-4 rounded-2xl shadow-sm border border-green-50">
                <h3 class="font-bold text-gray-600 text-sm mb-4 text-center">資産推移グラフ</h3>
                <div id="chart-container" class="flex items-end h-40 gap-1 mt-2">
                    </div>
                <div class="flex justify-between text-xs text-gray-400 mt-2">
                    <span>現在</span><span>設定年後</span>
                </div>
            </div>
        </section>

        <section id="simulator" class="tab-content space-y-4">
            <h2 class="text-lg font-bold text-gray-600">積立と目標の設定</h2>
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-green-50 space-y-5">
                <div>
                    <label class="block text-sm font-bold text-gray-500 mb-1">毎月の積立額 (円)</label>
                    <input type="number" id="input-monthly" class="w-full border-b-2 border-[#b7e4c7] p-2 text-xl font-bold outline-none bg-transparent text-gray-700" value="30000">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-500 mb-1">想定利回り (年利 %)</label>
                    <input type="number" id="input-rate" class="w-full border-b-2 border-[#b7e4c7] p-2 text-xl font-bold outline-none bg-transparent text-gray-700" value="5" step="0.1">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-500 mb-1">積立期間 (年)</label>
                    <input type="number" id="input-years" class="w-full border-b-2 border-[#b7e4c7] p-2 text-xl font-bold outline-none bg-transparent text-gray-700" value="20">
                </div>
                <div class="bg-[#f2fcf5] p-3 rounded-xl border border-green-100">
                    <label class="block text-sm font-bold text-[#2d6a4f] mb-1">🎯 最終目標金額 (円)</label>
                    <input type="number" id="input-goal" class="w-full border-b-2 border-[#52b788] p-2 text-xl font-bold outline-none bg-transparent text-gray-700" value="20000000">
                </div>
                <button onclick="saveSimulation()" class="w-full bg-[#52b788] text-white p-3 rounded-xl font-bold shadow-md">計算して保存</button>
            </div>
        </section>

        <section id="settings" class="tab-content space-y-6">
            <h2 class="text-lg font-bold text-gray-600">データと設定</h2>
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-green-50 space-y-4 text-center">
                <div class="space-y-2">
                    <p class="text-sm font-bold text-gray-500">バックアップ</p>
                    <button onclick="downloadFile()" class="w-full bg-green-100 text-green-700 py-2 rounded-xl text-sm font-bold">ファイルとして保存</button>
                    <div class="relative w-full">
                        <button class="w-full bg-gray-100 text-gray-600 py-2 rounded-xl text-sm font-bold">ファイルから復元</button>
                        <input type="file" onchange="uploadFile(event)" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer">
                    </div>
                </div>
                <hr class="border-gray-100">
                <div class="space-y-2">
                    <p class="text-sm font-bold text-gray-500">クラウド連携 (GAS)</p>
                    <input type="text" id="gas-url" class="w-full border border-gray-200 p-2 text-xs rounded-xl bg-gray-50" placeholder="GAS URLを貼り付け">
                    <button onclick="saveGasUrl()" class="w-full bg-green-600 text-white py-2 rounded-xl text-sm font-bold shadow-sm">連携URLを保存</button>
                </div>
            </div>
        </section>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-md border-t flex justify-around p-2 pb-8 shadow-2xl z-20">
        <button onclick="showTab('home')" class="flex flex-col items-center text-gray-400 gap-1 w-1/3 transition-colors" id="nav-home">
            <span class="text-2xl">💰</span><span class="text-[10px] font-bold">ダッシュボード</span>
        </button>
        <button onclick="showTab('simulator')" class="flex flex-col items-center text-gray-400 gap-1 w-1/3 transition-colors" id="nav-simulator">
            <span class="text-2xl">📊</span><span class="text-[10px] font-bold">シミュレーション</span>
        </button>
    </nav>
    <script src="app.js"></script>
</body>
</html>
