<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="icon.png">
    <title>資産形成管理</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body class="bg-[#f2fcf5] dark:bg-gray-900 pb-24 text-gray-700 dark:text-gray-200 transition-colors duration-300">
    <div id="splash" class="fixed inset-0 bg-[#b7e4c7] dark:bg-emerald-950 z-[100] flex flex-col items-center justify-center transition-opacity duration-500">
        <div id="splash-default" class="text-center">
            <div class="text-7xl mb-4 animate-bounce">💰</div>
            <h1 class="text-[#2d6a4f] dark:text-emerald-300 text-2xl font-black tracking-widest drop-shadow-md">ASSET APP</h1>
        </div>
        <img id="splash-custom" class="hidden max-w-[80%] max-h-[70%] object-contain rounded-2xl shadow-2xl animate-fade-in" src="" alt="Welcome">
    </div>

    <header class="bg-[#b7e4c7] dark:bg-emerald-900 text-[#2d6a4f] dark:text-emerald-100 p-4 sticky top-0 z-10 shadow-sm flex justify-between items-center">
        <h1 id="header-title" class="text-xl font-bold tracking-wide">💰 ダッシュボード</h1>
        <div class="flex gap-3">
            <button onclick="triggerManualSync()" id="sync-btn" class="text-xl drop-shadow-sm active:scale-95 transition-transform">☁️</button>
            <button onclick="showTab('settings')" class="text-xl drop-shadow-sm active:scale-95 transition-transform">⚙️</button>
        </div>
    </header>

    <main class="p-4 max-w-md mx-auto">
        <section id="home" class="tab-content active space-y-4">
            <div class="bg-white dark:bg-gray-800 p-5 rounded-2xl shadow-sm border border-green-50 dark:border-gray-700 relative">
                <p class="text-gray-400 text-xs font-bold mb-1">📍 現在のリアル評価額（NISA）</p>
                <div class="flex justify-between items-end">
                    <p id="current-eval-display" class="text-3xl font-black text-[#2d6a4f] dark:text-emerald-400 cursor-pointer transition-all blur-click" onclick="toggleBlur(this)">¥0</p>
                    <button onclick="updateEvalPrompt()" class="text-xs bg-[#eaf4f4] dark:bg-emerald-950 text-[#2d6a4f] dark:text-emerald-300 px-3 py-2 rounded-lg font-bold shadow-sm">📈 最新を反映</button>
                </div>
                <p class="text-xs text-gray-400 mt-2">※投資元本は自動計算されます（現在: <span id="current-principal-display" class="font-bold cursor-pointer blur-click" onclick="toggleBlur(this)">¥0</span>）</p>
            </div>
            
            <div class="bg-white dark:bg-gray-800 p-6 rounded-2xl shadow-sm border border-green-50 dark:border-gray-700 text-center">
                <p class="text-gray-400 text-sm font-bold mb-1">設定年数後の予測資産額</p>
                <p id="future-amount" class="text-4xl font-black text-[#52b788] dark:text-emerald-400 drop-shadow-sm cursor-pointer blur-click" onclick="toggleBlur(this)">¥0</p>
                <p class="text-xs text-gray-400 mt-1">実質価値 (インフレ考慮): <span id="future-real-amount" class="font-bold cursor-pointer blur-click" onclick="toggleBlur(this)">¥0</span></p>
            </div>

            <div id="memo-display-panel" class="hidden bg-orange-50 dark:bg-amber-950/40 p-3 rounded-xl text-xs border border-orange-100 dark:border-amber-900 text-gray-500 dark:text-amber-200">
                ✏️ <strong>最新のメモ:</strong> <span id="latest-memo-text"></span>
            </div>

            <div class="bg-white dark:bg-gray-800 p-4 rounded-2xl shadow-sm border border-green-50 dark:border-gray-700">
                <h3 class="font-bold text-gray-600 dark:text-gray-400 text-sm mb-4 text-center">資産推移グラフ（元本＋利益）</h3>
                <div id="chart-container" class="flex items-end h-40 gap-1 mt-2"></div>
                <div class="flex justify-between text-[10px] text-gray-400 mt-2"><span>現在</span><span>設定年後</span></div>
            </div>
        </section>

        <section id="milestones" class="tab-content space-y-4">
            <h2 class="text-lg font-bold text-gray-600 dark:text-gray-300">ご褒美スタンプカード</h2>
            <p class="text-xs text-gray-500">評価額が目標に達したらご褒美！</p>
            <div id="stamp-list" class="grid grid-cols-2 gap-3"></div>
        </section>

        <section id="simulator" class="tab-content space-y-4">
            <h2 class="text-lg font-bold text-gray-600 dark:text-gray-300">積立設定</h2>
            <div class="bg-white dark:bg-gray-800 p-5 rounded-2xl shadow-sm border border-green-50 dark:border-gray-700 space-y-4">
                <div class="flex gap-3">
                    <div class="flex-1">
                        <label class="block text-sm font-bold text-gray-500 mb-1">毎月の積立額 (円)</label>
                        <input type="number" id="input-monthly" class="w-full border-b-2 border-[#b7e4c7] p-2 text-xl font-bold outline-none bg-transparent" value="30000">
                    </div>
                    <div class="w-24">
                        <label class="block text-sm font-bold text-gray-500 mb-1">毎月〇日</label>
                        <input type="number" id="input-day" class="w-full border-b-2 border-[#b7e4c7] p-2 text-xl font-bold outline-none bg-transparent text-center" value="1" min="1" max="28">
                    </div>
                </div>
                <div class="flex gap-3">
                    <div class="flex-1">
                        <label class="block text-sm font-bold text-gray-500 mb-1">想定利回り (%)</label>
                        <input type="number" id="input-rate" class="w-full border-b-2 border-[#b7e4c7] p-2 text-xl font-bold outline-none bg-transparent" value="5" step="0.1">
                    </div>
                    <div class="flex-1">
                        <label class="block text-sm font-bold text-gray-500 mb-1">インフレ率 (%)</label>
                        <input type="number" id="input-inflation" class="w-full border-b-2 border-[#b7e4c7] p-2 text-xl font-bold outline-none bg-transparent" value="2" step="0.1">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-500 mb-1">シミュレーション期間 (年)</label>
                    <input type="number" id="input-years" class="w-full border-b-2 border-[#b7e4c7] p-2 text-xl font-bold outline-none bg-transparent" value="20">
                </div>
                <button onclick="saveSimulation()" class="w-full bg-[#52b788] text-white p-3 rounded-xl font-bold shadow-md mt-2">設定を保存</button>
            </div>
        </section>

        <section id="settings" class="tab-content space-y-6">
            <h2 class="text-lg font-bold text-gray-600 dark:text-gray-300">アプリの詳細設定</h2>
            
            <div class="bg-white dark:bg-gray-800 p-5 rounded-2xl shadow-sm border border-green-50 dark:border-gray-700 space-y-4">
                <div>
                    <label class="block text-xs font-bold text-gray-400 mb-1">🔑 アプリ起動時のパスワード変更</label>
                    <input type="password" id="settings-password" class="w-full border-b border-gray-200 dark:border-gray-600 p-2 text-sm bg-transparent font-bold text-gray-700 dark:text-gray-200 outline-none" placeholder="例：0000">
                </div>
                <label class="flex items-center justify-between p-1">
                    <span class="text-xs font-bold text-gray-400">🕵️ のぞき見防止フィルターを常時ON</span>
                    <input type="checkbox" id="settings-peeping" class="w-5 h-5 accent-[#52b788]" onchange="applyPeepingFilter()">
                </label>
                <label class="flex items-center justify-between p-1">
                    <span class="text-xs font-bold text-gray-400">☁️ 操作時に自動でバックアップ</span>
                    <input type="checkbox" id="settings-auto-sync" class="w-5 h-5 accent-[#52b788]">
                </label>
                <div class="grid grid-cols-2 gap-3 items-end">
                    <div>
                        <label class="block text-xs font-bold text-gray-400 mb-1">🖼️ お出迎え画像 (シナモン等)</label>
                        <div class="relative bg-gray-100 dark:bg-gray-700 text-center py-2 rounded-xl text-xs font-bold text-gray-500 cursor-pointer overflow-hidden border border-dashed border-gray-300">
                            <span>画像を選ぶ</span>
                            <input type="file" onchange="saveWelcomeImage(event)" class="absolute inset-0 opacity-0 cursor-pointer">
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-400 mb-1">⏱️ タイトル表示時間</label>
                        <select id="settings-splash-time" class="w-full border-b border-gray-200 dark:border-gray-600 p-2 text-sm bg-transparent font-bold text-gray-700 dark:text-gray-200 outline-none">
                            <option value="500">サクッと (0.5秒)</option>
                            <option value="1200" selected>普通 (1.2秒)</option>
                            <option value="2500">じっくり (2.5秒)</option>
                        </select>
                    </div>
                </div>
                <div id="welcome-img-preview-container" class="hidden text-center">
                    <img id="welcome-img-preview" class="h-16 mx-auto rounded-lg shadow-sm" src="">
                    <button onclick="clearWelcomeImage()" class="text-[10px] text-red-400 underline mt-1 block mx-auto">画像を消去</button>
                </div>

                <hr class="border-gray-100 dark:border-gray-700">
                <div>
                    <label class="block text-xs font-bold text-gray-400 mb-2">💮 ご褒美カスタマイズ</label>
                    <div id="custom-rewards-list" class="space-y-2 max-h-48 overflow-y-auto p-1"></div>
                </div>

                <button onclick="saveAppSettings()" class="w-full bg-[#52b788] text-white py-2.5 rounded-xl text-sm font-bold shadow-md">設定を保存する</button>
            </div>

            <div class="bg-white dark:bg-gray-800 p-5 rounded-2xl shadow-sm border border-green-50 dark:border-gray-700 space-y-4 text-center">
                <div class="space-y-2">
                    <p class="text-sm font-bold text-gray-400">クラウド連携 (GAS URL)</p>
                    <input type="text" id="gas-url" class="w-full border border-gray-200 dark:border-gray-600 p-2 text-xs rounded-xl bg-gray-50 dark:bg-gray-700 text-gray-700 dark:text-gray-200" placeholder="GAS URLを貼り付け">
                    <button onclick="saveGasUrl()" class="w-full bg-green-100 dark:bg-green-900 text-green-700 dark:text-green-200 py-2 rounded-xl text-xs font-bold">連携URLを保存</button>
                </div>
                <hr class="border-gray-100 dark:border-gray-700">
                <button onclick="resetData()" class="w-full bg-red-50 text-red-500 py-2 rounded-xl text-xs font-bold border border-red-100 dark:border-red-900 dark:bg-transparent">🗑️ 全データをリセット</button>
            </div>
        </section>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white/90 dark:bg-gray-800/90 backdrop-blur-md border-t dark:border-gray-700 flex justify-around p-2 pb-8 shadow-2xl z-20">
        <button onclick="showTab('home')" class="flex flex-col items-center text-gray-400 gap-1 w-1/3" id="nav-home"><span class="text-2xl">💰</span><span class="text-[10px] font-bold">ホーム</span></button>
        <button onclick="showTab('milestones')" class="flex flex-col items-center text-gray-400 gap-1 w-1/3" id="nav-milestones"><span class="text-2xl">💮</span><span class="text-[10px] font-bold">スタンプ</span></button>
        <button onclick="showTab('settings')" class="flex flex-col items-center text-gray-400 gap-1 w-1/3" id="nav-settings"><span class="text-2xl">⚙️</span><span class="text-[10px] font-bold">設定</span></button>
    </nav>
    <script src="app.js"></script>
</body>
</html>
