<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="icon.png">
    <title>資産形成管理</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#f2fcf5] pb-24 text-gray-700">
    <div id="splash" class="fixed inset-0 bg-[#b7e4c7] z-[100] flex flex-col items-center justify-center transition-opacity duration-500">
        <div class="text-7xl mb-4 animate-bounce">💰</div>
        <h1 class="text-[#2d6a4f] text-2xl font-black tracking-widest drop-shadow-md">ASSET APP</h1>
    </div>

    <header class="bg-[#b7e4c7] text-[#2d6a4f] p-4 sticky top-0 z-10 shadow-sm flex justify-between items-center transition-colors">
        <h1 id="header-title" class="text-xl font-bold tracking-wide">💰 ダッシュボード</h1>
        <div class="flex gap-3">
            <button onclick="syncCloud()" id="sync-btn" class="text-xl drop-shadow-sm">☁️</button>
            <button onclick="showTab('settings')" class="text-xl drop-shadow-sm">⚙️</button>
        </div>
    </header>

    <main class="p-4 max-w-md mx-auto">
        <!-- 1. ダッシュボード -->
        <section id="home" class="tab-content active space-y-4">
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-green-50 relative">
                <p class="text-gray-400 text-xs font-bold mb-1">📍 現在のリアル評価額（NISA）</p>
                <div class="flex justify-between items-end">
                    <p id="current-eval-display" class="text-3xl font-black text-[#2d6a4f]">¥0</p>
                    <button onclick="updateEvalPrompt()" class="text-xs bg-[#eaf4f4] text-[#2d6a4f] px-3 py-2 rounded-lg font-bold shadow-sm">📈 最新を反映</button>
                </div>
                <p class="text-xs text-gray-400 mt-2">※投資元本は自動で積立計算されます（現在: <span id="current-principal-display">¥0</span>）</p>
            </div>
            
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-green-50 text-center">
                <p class="text-gray-400 text-sm font-bold mb-1">設定年数後の予測資産額</p>
                <p id="future-amount" class="text-4xl font-black text-[#52b788] drop-shadow-sm">¥0</p>
                <p class="text-xs text-gray-400 mt-1">実質価値 (インフレ考慮): <span id="future-real-amount" class="font-bold">¥0</span></p>
            </div>

            <div class="bg-white p-4 rounded-2xl shadow-sm border border-green-50">
                <h3 class="font-bold text-gray-600 text-sm mb-4 text-center">資産推移グラフ（元本＋利益）</h3>
                <div id="chart-container" class="flex items-end h-40 gap-1 mt-2"></div>
                <div class="flex justify-between text-[10px] text-gray-400 mt-2"><span>現在</span><span>設定年後</span></div>
            </div>
        </section>

        <!-- 2. スタンプ（マイルストーン） -->
        <section id="milestones" class="tab-content space-y-4">
            <h2 class="text-lg font-bold text-gray-600">ご褒美スタンプカード</h2>
            <p class="text-xs text-gray-500 mb-4">評価額が目標に達したらご褒美！</p>
            <div id="stamp-list" class="grid grid-cols-2 gap-3"></div>
        </section>

        <!-- 3. シミュレーション設定 -->
        <section id="simulator" class="tab-content space-y-4">
            <h2 class="text-lg font-bold text-gray-600">積立設定</h2>
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-green-50 space-y-4">
                <div class="flex gap-3">
                    <div class="flex-1">
                        <label class="block text-sm font-bold text-gray-500 mb-1">毎月の積立額 (円)</label>
                        <input type="number" id="input-monthly" class="w-full border-b-2 border-[#b7e4c7] p-2 text-xl font-bold outline-none bg-transparent" value="30000">
                    </div>
                    <div class="w-24">
                        <label class="block text-sm font-bold text-gray-500 mb-1">毎月〇日</label>
                        <input type="number" id="input-day" class="w-full border-b-2 border-[#b7e4c7] p-2 text-xl font-bold outline-none bg-transparent text-center" value="1" min="1" max="28">
                    </div>
                </div>
                <div class="flex gap-3">
                    <div class="flex-1">
                        <label class="block text-sm font-bold text-gray-500 mb-1">想定利回り (%)</label>
                        <input type="number" id="input-rate" class="w-full border-b-2 border-[#b7e4c7] p-2 text-xl font-bold outline-none bg-transparent" value="5" step="0.1">
                    </div>
                    <div class="flex-1">
                        <label class="block text-sm font-bold text-gray-500 mb-1">インフレ率 (%)</label>
                        <input type="number" id="input-inflation" class="w-full border-b-2 border-[#b7e4c7] p-2 text-xl font-bold outline-none bg-transparent" value="2" step="0.1">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-500 mb-1">シミュレーション期間 (年)</label>
                    <input type="number" id="input-years" class="w-full border-b-2 border-[#b7e4c7] p-2 text-xl font-bold outline-none bg-transparent" value="20">
                </div>
                <button onclick="saveSimulation()" class="w-full bg-[#52b788] text-white p-3 rounded-xl font-bold shadow-md mt-2">設定を保存</button>
            </div>
        </section>

        <!-- 4. 設定 -->
        <section id="settings" class="tab-content space-y-6">
            <h2 class="text-lg font-bold text-gray-600">データと設定</h2>
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-green-50 space-y-4 text-center">
                <button onclick="downloadFile()" class="w-full bg-green-100 text-green-700 py-2 rounded-xl text-sm font-bold">バックアップ保存</button>
                <div class="relative w-full">
                    <button class="w-full bg-gray-100 text-gray-600 py-2 rounded-xl text-sm font-bold">データ復元</button>
                    <input type="file" onchange="uploadFile(event)" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer">
                </div>
                <hr class="border-gray-100">
                <button onclick="resetData()" class="w-full bg-red-50 text-red-500 py-2 rounded-xl text-sm font-bold border border-red-100">🗑️ 全データをリセット</button>
            </div>
        </section>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-md border-t flex justify-around p-2 pb-8 shadow-2xl z-20">
        <button onclick="showTab('home')" class="flex flex-col items-center text-gray-400 gap-1 w-1/3 transition-colors" id="nav-home"><span class="text-2xl">💰</span><span class="text-[10px] font-bold">ホーム</span></button>
        <button onclick="showTab('milestones')" class="flex flex-col items-center text-gray-400 gap-1 w-1/3 transition-colors" id="nav-milestones"><span class="text-2xl">💮</span><span class="text-[10px] font-bold">スタンプ</span></button>
        <button onclick="showTab('simulator')" class="flex flex-col items-center text-gray-400 gap-1 w-1/3 transition-colors" id="nav-simulator"><span class="text-2xl">📊</span><span class="text-[10px] font-bold">設定</span></button>
    </nav>
    <script src="app.js"></script>
</body>
</html>
